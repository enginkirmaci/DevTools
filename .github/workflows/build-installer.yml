name: Build and Release Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # Tag like v1.2.3 -> 1.2.3
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Manual dispatch has no tag; fall back so the build still works.
            VERSION="0.0.0-dev"
            echo "::warning::Build is not running from a tag; falling back to ${VERSION}"
          fi
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Version '${VERSION}' (from '${GITHUB_REF_NAME}') is not in x.y.z format"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Restore dependencies
        run: dotnet restore Tools.slnx

      - name: Build solution
        run: dotnet build Tools.slnx --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Publish Tools
        run: dotnet publish src\Tools\Tools.csproj -c Release -r win-x64 --self-contained true -p:Platform=x64 -p:Version=${{ steps.version.outputs.version }} -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true

      - name: Publish DevTools
        run: dotnet publish src\DevTools\DevTools.csproj -c Release -r win-x64 --self-contained true -p:Platform=x64 -p:Version=${{ steps.version.outputs.version }} -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.version }} setup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevTools-Installer
          path: installer/*.exe

      - name: Build portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path portable | Out-Null
          # Stage to a clean folder, excluding pdbs/xml so the zip stays lean and the
          # installer's source dir is not mutated. The portable build stores its data
          # in %USERPROFILE%\.devtools, same as the installer; the bundled settings\
          # tree is seeded into the user folder on first run via UserPaths.SeedFromDefault.
          robocopy "bin\output\publish" "bin\portable-stage" /E /XF *.pdb *.xml | Out-Null
          if ($LASTEXITCODE -ge 8) { throw "robocopy failed with exit code $LASTEXITCODE" }
          Compress-Archive -Path "bin\portable-stage\*" `
            -DestinationPath "portable\DevTools-Portable-${{ steps.version.outputs.version }}.zip" `
            -CompressionLevel Optimal

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: DevTools-Portable
          path: portable/*.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/*.exe
            portable/*.zip
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
